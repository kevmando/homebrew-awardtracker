# NOTE: This workflow is designed to run in the upstream/source repository (shyoo/awardtracker).
# It triggers when a release is published there and dispatches an event to this tap repository to trigger 'deploy-cask.yml'.
# To use this, add a Personal Access Token (PAT) as a secret named 'TAP_GITHUB_TOKEN' in the source repository.

name: Dispatch Cask Update

on:
  release:
    types: [published]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cask Update in Tap Repository
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TAP_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/kevmando/homebrew-awardtracker/dispatches \
            -d "{\"event_type\": \"new-release\", \"client_payload\": {\"version\": \"$TAG_NAME\"}}"
