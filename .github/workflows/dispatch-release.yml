# This workflow triggers when a release is published in this repository.
# It dispatches a 'new-release' event to the same repository to trigger 'deploy-cask.yml'.
# Note: To test this, you must add your Personal Access Token (PAT) as a secret named 'TAP_GITHUB_TOKEN' in this repository.

name: Dispatch Cask Update

on:
  release:
    types: [published]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cask Update in Tap Repository
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.TAP_GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/kevmando/homebrew-awardtracker/dispatches \
            -d '{"event_type": "new-release", "client_payload": {"version": "${{ github.event.release.tag_name }}"}}'
