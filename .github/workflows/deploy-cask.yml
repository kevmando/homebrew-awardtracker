name: Deploy Cask Upgrade

on:
  repository_dispatch:
    types: [new-release]
  schedule:
    # Run daily at 00:00 UTC to check for upstream updates
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., 1.3.4). Leave blank to auto-detect latest upstream release.'
        required: false
        type: string

jobs:
  upgrade-cask:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run Cask update script
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            echo "Triggered by repository_dispatch. Version: $DISPATCH_VERSION"
            python3 .github/scripts/update_cask.py "$DISPATCH_VERSION"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION" ]; then
            echo "Triggered by workflow_dispatch manually. Version: $INPUT_VERSION"
            python3 .github/scripts/update_cask.py "$INPUT_VERSION"
          else
            echo "Triggered automatically (schedule or dispatch fallback). Auto-detecting version."
            python3 .github/scripts/update_cask.py
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes to commit (updates or new backup files)
          if [ -n "$(git status --porcelain)" ]; then
            # Extract the new version from the updated cask file
            NEW_VERSION=$(grep -E '^\s*version\s+' Casks/awardtracker.rb | sed -E 's/.*version\s+"([^"]+)".*/\1/')
            
            git add Casks/
            git commit -m "Update awardtracker to $NEW_VERSION"
            git push
          else
            echo "No changes to deploy."
          fi
